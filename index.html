<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Kappo CRM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      margin: 0;
    }

    .hidden { display: none; }
    .page { display: none; }
    .page.active { display: block; }

    #login-screen {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #111827;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
    }

    input, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
    }

    #app {
      display: flex;
    }

    #sidebar {
      width: 200px;
      background: #111827;
      padding: 20px;
    }

    .nav-item {
      display: block;
      margin: 10px 0;
      cursor: pointer;
    }

    #content {
      flex: 1;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    td, th {
      border: 1px solid #333;
      padding: 8px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="card">
    <h2>Login</h2>
    <input id="login-user" placeholder="Usuário" value="admin">
    <input id="login-pass" type="password" placeholder="Senha" value="admin123">
    <button id="btn-login">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <h3 id="sidebar-username">User</h3>

    <div class="nav-item" data-page="dashboard">Dashboard</div>
    <div class="nav-item" data-page="clientes">Clientes</div>
    <div class="nav-item" data-page="mensalidades">Mensalidades</div>

    <div class="nav-item" id="btn-logout">Sair</div>
  </div>

  <!-- CONTEÚDO -->
  <div id="content">

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
      <h2>Dashboard</h2>
      <p>Total Clientes: <span id="val-clientes">0</span></p>

      <button onclick="App.navigate('mensalidades')">
        Ver Todos
      </button>
    </div>

    <!-- CLIENTES -->
    <div id="page-clientes" class="page">
      <h2>Clientes</h2>

      <button id="btn-novo-cliente">Novo Cliente</button>

      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>WhatsApp</th>
            <th>Email</th>
            <th>Vencimento</th>
            <th>Valor</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tbody-clientes"></tbody>
      </table>
    </div>

    <!-- MENSALIDADES -->
    <div id="page-mensalidades" class="page">
      <h2>Mensalidades</h2>
      <p>Em construção...</p>
    </div>

  </div>
</div>

<!-- MODAL CLIENTE -->
<div id="modal-cliente" class="hidden">
  <div class="card">
    <h3>Novo Cliente</h3>

    <input id="cli-nome" placeholder="Nome">
    <input id="cli-whatsapp" placeholder="WhatsApp">
    <input id="cli-vencimento" placeholder="Dia Vencimento">
    <input id="cli-valor" placeholder="Valor">

    <button id="btn-save-cliente">Salvar Cliente</button>
    <button onclick="Modal.close('modal-cliente')">Fechar</button>
  </div>
</div>

<!-- SCRIPTS (ORDEM CORRETA) -->
<script src="db.js"></script>
<script src="app.js"></script>

</body>
</html>
